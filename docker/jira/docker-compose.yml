services:
  jira:
    image: atlassian/jira-software:9.17
    container_name: fakeenergy-jira
    ports:
      - "8090:8080"
    environment:
      ATL_JDBC_URL: jdbc:postgresql://jira-db:5432/jiradb
      ATL_JDBC_USER: jira
      ATL_JDBC_PASSWORD: jiradbpw
      ATL_DB_DRIVER: org.postgresql.Driver
      ATL_DB_TYPE: postgres72
      JVM_MINIMUM_MEMORY: 512m
      JVM_MAXIMUM_MEMORY: 1536m
    volumes:
      - jira_home:/var/atlassian/application-data/jira
    depends_on:
      - jira-db
    restart: unless-stopped

  jira-db:
    image: postgres:14-alpine
    container_name: fakeenergy-jira-db
    environment:
      POSTGRES_DB: jiradb
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: jiradbpw
    volumes:
      - jira_db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  jira_home:
  jira_db:
